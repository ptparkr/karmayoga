<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
  <title>Progress Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="widget-container">
    <header class="widget-header" id="drag-region">
      <span class="widget-title">📊 MY PROGRESS</span>
      <div class="window-controls">
        <button class="control-btn minimize-btn" id="minimize-btn" title="Minimize">─</button>
        <button class="control-btn close-btn" id="close-btn" title="Close">×</button>
      </div>
    </header>

    <main class="widget-content">
      <section class="streak-display">
        <div class="streak-card current">
          <div class="streak-icon">🔥</div>
          <div class="streak-info">
            <span class="streak-label">CURRENT STREAK</span>
            <div class="streak-value-container">
              <span class="streak-value" id="current-streak">0</span>
              <span class="streak-unit">DAYS</span>
            </div>
          </div>
        </div>
        <div class="streak-card longest">
          <div class="streak-icon">🏆</div>
          <div class="streak-info">
            <span class="streak-label">LONGEST STREAK</span>
            <div class="streak-value-container">
              <span class="streak-value" id="longest-streak">0</span>
              <span class="streak-unit">DAYS</span>
            </div>
          </div>
        </div>
      </section>

      <section class="heatmap-section">
        <div class="heatmap-months" id="heatmap-months"></div>
        <div class="heatmap-container">
          <div class="heatmap-days">
            <span>Mon</span>
            <span>Wed</span>
            <span>Fri</span>
          </div>
          <div class="heatmap-grid" id="heatmap-grid"></div>
        </div>
        <div class="heatmap-legend">
          <span class="legend-label">Less</span>
          <div class="legend-cells">
            <div class="legend-cell level-0"></div>
            <div class="legend-cell level-1"></div>
            <div class="legend-cell level-2"></div>
            <div class="legend-cell level-3"></div>
            <div class="legend-cell level-4"></div>
          </div>
          <span class="legend-label">More</span>
        </div>
      </section>

      <section class="checkin-section">
        <button class="checkin-btn" id="checkin-btn">
          <span>✓ Check In Today</span>
        </button>
      </section>
    </main>

    <div class="confetti-container" id="confetti-container"></div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content" id="modal-content">
      <div class="modal-icon">🎯</div>
      <h2 class="modal-title">DID YOU MAKE PROGRESS?</h2>
      <p class="modal-subtitle">Did you work on your goals today?</p>
      
      <div class="dropdown-container" id="dropdown-container">
        <button class="dropdown-btn" id="dropdown-btn">
          <span id="dropdown-selected">Select an option</span>
          <span class="dropdown-arrow">▼</span>
        </button>
        <div class="dropdown-menu" id="dropdown-menu">
          <div class="dropdown-option" data-value="yes">
            <span class="option-icon">✅</span>
            <span>Yes, I made progress!</span>
          </div>
          <div class="dropdown-option" data-value="no">
            <span class="option-icon">❌</span>
            <span>No, not today</span>
          </div>
        </div>
      </div>

      <div class="modal-buttons">
        <button class="modal-btn no-btn" id="no-btn" disabled>NO</button>
        <button class="modal-btn yes-btn" id="yes-btn" disabled>YES</button>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script src="renderer.js"></script>
</body>
</html>
